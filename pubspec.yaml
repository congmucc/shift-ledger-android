name: shift_ledger
description: "Shift Ledger / 工时账本 Flutter app."
publish_to: 'none'
version: 1.1.6+7

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  path_provider: ^2.1.5
  flutter_secure_storage: ^10.2.0
  crypto: ^3.0.6
  table_calendar: ^3.2.0
  flutter_file_dialog: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_secure_storage_platform_interface: ^2.0.1

flutter:
  uses-material-design: true
  fonts:
    - family: ShiftLedgerCJK
      fonts:
        - asset: assets/fonts/ShiftLedgerCJK-Regular.otf
          weight: 400
        - asset: assets/fonts/ShiftLedgerCJK-Bold.otf
          weight: 700
